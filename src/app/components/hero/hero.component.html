<div class="landing-page-hero">
    <div class="header-section">
      <h1 class="header">Lekkoatletyka dla dzieci we Wrocławiu</h1>
      <p class="subheader">Na naszych zajęciach sportowych łączymy trening, diagnostykę i regularne pomiary, tworząc kompleksowy program rozwoju motorycznego dzieci.</p>
      <div class="button">
        <button class="sign-up-button" (click)="acknowledgeButtonClick()" [routerLink]="['/zapisy']">Wypróbuj bezpłatnie</button>
      </div>
    </div>
    <div class="image-section">
      <img
        class="image"
        src="./assets/optimized/hero-900.jpg"
        srcset="./assets/optimized/hero-600.jpg 600w, ./assets/optimized/hero-900.jpg 900w, ./assets/optimized/hero-1200.jpg 1200w, ./assets/optimized/hero-1600.jpg 1600w"
        sizes="(max-width: 1024px) 100vw, 600px"
        decoding="async"
        fetchpriority="high"
      >
    </div>
  </div>
