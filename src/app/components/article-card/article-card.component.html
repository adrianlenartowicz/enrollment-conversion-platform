<div class="article-card" [routerLink]="['/artykuly', id]">
    <div class="article-image">
        <img [src]="image">
    </div>
    <div class="article-preview">
        <div class="preview-header">
            <h4>{{header}}</h4>
        </div>
        <div class="preview-content">
            <p>{{paragraph}}</p>
        </div>
    </div>
</div>
