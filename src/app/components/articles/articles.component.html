<section class="py-6 md:py-8 lg:py-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 space-y-6 md:space-y-8">
        <header class="text-center">
            <h1 class="mt-3 text-3xl md:text-4xl font-extrabold text-gray-900">Artykuły</h1>
        </header>
        <div class="section-content">
            <app-article-card
            *ngFor="let article of articles"
            [header]="article.header"
            [paragraph]="article.paragraph"
            [image]="article.image"
            [imageSrcset]="article.imageSrcset"
            [id]="article.id"></app-article-card>
        </div>
    </div>
</section>
